<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>

   <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1f3b4d, #0f2027);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        background: rgba(255, 255, 255, 0.07);
        padding: 35px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
        width: 380px;
        transition: 0.3s ease;
    }

    .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 60px rgba(0, 255, 255, 0.25);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #00f7ff;
        font-size: 26px;
        letter-spacing: 1px;
        text-shadow: 0 0 12px #00f7ff;
    }

    label {
        font-size: 13px;
        color: #cfd8dc;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        margin-bottom: 14px;
        border: none;
        border-radius: 10px;
        outline: none;
        background: rgba(255,255,255,0.15);
        color: white;
        font-size: 14px;
        transition: 0.2s;
    }

    input::placeholder {
        color: #bbb;
    }

    input:focus {
        background: rgba(255,255,255,0.25);
        box-shadow: 0 0 10px #00f7ff;
        transform: scale(1.02);
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(45deg, #00f7ff, #00ff9d);
        color: black;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    input[type="submit"]:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #00f7ff, 0 0 25px #00ff9d;
    }

    h3 {
        text-align: center;
        margin-top: 18px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(0, 255, 157, 0.15);
        color: #00ff9d;
        font-size: 16px;
        box-shadow: 0 0 10px rgba(0,255,157,0.3);
    }
</style>
</head>

<body>

<div class="container">
    <h2>Diabetes Prediction</h2>

    <form method="post" action="/predict">

        <label>Number of Pregnancies:</label>
        <input type="text" name="num_preg" placeholder="e.g., 2" value="{{ form_data.num_preg if form_data else '' }}">

        <label>Glucose Concentration:</label>
        <input type="text" name="glucose_conc" placeholder="e.g., 120" value="{{ form_data.glucose_conc if form_data else '' }}">

        <label>Diastolic Blood Pressure:</label>
        <input type="text" name="diastolic_bp" placeholder="e.g., 70" value="{{ form_data.diastolic_bp if form_data else '' }}">

        <label>Insulin:</label>
        <input type="text" name="insulin" placeholder="e.g., 94" value="{{ form_data.insulin if form_data else '' }}">

        <label>BMI:</label>
        <input type="text" name="bmi" placeholder="e.g., 30.5" value="{{ form_data.bmi if form_data else '' }}">

        <label>Diabetes Pedigree Function:</label>
        <input type="text" name="diab_pred" placeholder="e.g., 0.372" value="{{ form_data.diab_pred if form_data else '' }}">

        <label>Age:</label>
        <input type="text" name="age" placeholder="e.g., 33" value="{{ form_data.age if form_data else '' }}">

        <label>Skin Thickness:</label>
        <input type="text" name="skin" placeholder="e.g., 20" value="{{ form_data.skin if form_data else '' }}">

        <input type="submit" value="Predict">

    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}
</div>

</body>
</html>
